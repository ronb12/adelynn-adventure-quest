kind = "mobile"
previewPath = "/mobile-game/"
title = "Adelynn's Quest Mobile"
version = "1.0.0"
id = "artifacts/mobile-game"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile-game/" ]
localPort = 24383

[services.development]
run = "pnpm --filter @workspace/mobile-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile-game", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile-game", "run", "serve" ]

[services.env]
PORT = "24383"
BASE_PATH = "/mobile-game/"
